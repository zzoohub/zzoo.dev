      - generic [ref=e25]:
        - heading "Claude Harness — AI Orchestration Framework" [level=1] [ref=e26]
        - paragraph [ref=e27]: A multi-agent orchestration harness for Claude Code. Blocks the orchestrator from writing code directly and forces delegation to sub-agents.
        - generic [ref=e28]:
          - generic [ref=e29]: Developer Tools
          - generic [ref=e30]: AI
      - generic [ref=e31]:
        - generic [ref=e32]:
          - paragraph [ref=e33]: Claude Code reads, writes, and tests code on its own. But push it on complex tasks and the limits show — context overflows, verification gets skipped, the thread loses track. An orchestrator harness is the layer that fixes this. It hooks into Claude Code's lifecycle to split work across sub-agents, track progress, and verify completion.
          - paragraph [ref=e34]: oh-my-claudecode is one of the most widely used harnesses in the Claude ecosystem. 19 agents, 30 skills, 35 MCP tools — 200+ files, tens of thousands of lines. Use it across projects and a pattern emerges. Agents and skills get rewritten every time. But the orchestration flow — force delegation, track progress, verify completion — stays identical.
          - paragraph [ref=e35]: Claude Harness extracts that orchestrator into a lightweight, standalone harness. Plug in your own agents and skills per project. 19 files, 2,371 lines. Zero runtime dependencies.
          - heading "Core Flow" [level=2] [ref=e36]
          - paragraph [ref=e37]: Type "autopilot" and it cycles through understand, plan, execute, verify. The orchestrator can't write code directly — Write and Edit are blocked on source files, forcing delegation to sub-agents. When a sub-agent reports "done," the orchestrator verifies with tests and builds. Failure loops back to execute. Only the last phase allows a clean exit.
          - paragraph [ref=e38]: Type "loop" for execute then verify on repeat until it passes. Large tasks parallelize via tmux — batches of four, automatic polling, retry on failure.
          - paragraph [ref=e39]: State survives session crashes. Mode, phase, working memory — all persisted to disk and auto-restored on the next session.
          - heading "Install" [level=2] [ref=e40]
          - paragraph [ref=e41]: "Works as a Claude Code plugin. Install directly from GitHub:"
          - code [ref=e43]: /plugin marketplace add zzoohub/claude-code /plugin install claude-harness@zzoohub-claude-code
          - paragraph [ref=e44]:
            - text: Define your agents in
            - code [ref=e45]: .claude/harness.json
            - text: — model, prompt, tool scope. That's all the setup there is.
