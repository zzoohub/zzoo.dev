      - generic [ref=e32]:
        - generic [ref=e33]:
          - paragraph [ref=e34]: Google indexes your portfolio. Perplexity cites it in answers. ChatGPT pulls facts from it when someone asks about your stack. Or none of that happens — because your site is a visual brochure that machines cannot parse.
          - paragraph [ref=e35]: "Most developer portfolios optimize for one audience: the human visitor. This site is an experiment in serving three simultaneously — humans who evaluate, search engines that rank, and AI systems that extract and cite — from pure static HTML."
          - heading "Three audiences, one constraint" [level=2] [ref=e36]
          - paragraph [ref=e37]:
            - text: "The constraint is zero runtime. No server, no database, no API routes. Every page is pre-rendered HTML served from Vercel's edge. That sounds limiting until you realize what it enables: sub-second loads, zero attack surface, and a deployment model where pushing to"
            - code [ref=e38]: main
            - text: is the entire workflow.
          - paragraph [ref=e39]:
            - text: The interesting question is whether static HTML can carry enough structure for machines without sacrificing readability for humans. JSON-LD schemas give answer engines machine-readable context about every entity — person, project, blog post. An
            - code [ref=e40]: llms.txt
            - text: file at the site root gives LLMs a plain-text map of the site. Semantic HTML and hreflang alternates handle traditional search. All three channels share the same content; they just read it differently.
          - heading "Content that shows thinking" [level=2] [ref=e41]
          - paragraph [ref=e42]: Each project gets three tabs. Overview for the five-second scan — what is this, why does it matter. Design for the product thinker who wants trade-offs and rejected alternatives. Engineering for the builder who wants architecture decisions and implementation details.
          - paragraph [ref=e43]: A hiring manager reads one tab. A fellow engineer reads all three. Nobody wades through content meant for someone else.
          - paragraph [ref=e44]: All content is file-based MDX with Zod-validated frontmatter. Missing Korean translations fall back to English. No CMS, no database — files in a git repo, version-controlled like code.
          - heading "Bilingual, not translated" [level=2] [ref=e45]
          - paragraph [ref=e46]: English and Korean exist as parallel content. Same structure, but each written natively in its language. The language switcher is a single button — with two locales, a dropdown wastes a click. New content ships in one language first; the fallback ensures nothing breaks.
          - heading "Open source" [level=2] [ref=e47]
          - paragraph [ref=e48]:
            - text: The
